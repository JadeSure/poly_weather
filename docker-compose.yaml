version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -e . &&
      uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -e . &&
      python -m src.worker.main"
    env_file:
      - .env
    depends_on:
      - api

